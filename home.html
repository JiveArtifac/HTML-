<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">
        <div class="logo">Amin<span>.</span></div>

        <div class="nav-links">
            <a href="home.html" class="active">Home</a>
            <a href="about.html">About</a>
            <a href="tools.html">Tools</a>
            <a href="cv.pdf" target="_blank" download>CV</a>
        </div>

        <label class="switch">
            <input type="checkbox" onclick="toggleTheme()">
            <span class="slider"></span>
        </label>
    </nav>

    <div class="hero">
        <h1>Amin Shakul Hameed</h1>
        <p>Student Developer | Creator of DOST Chatbot</p>
        <div id="type"></div>
    </div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle("dark");
        }

        const texts = ["Student Developer", "AI Chatbot Creator", "DOST Builder"];

        let i = 0, j = 0;

        function type() {
            document.getElementById("type").innerHTML =
                texts[i].substring(0, j);

            j++;

            if (j > texts[i].length) {
                j = 0;
                i = (i + 1) % texts.length;
            }

            setTimeout(type, 120);
        }

        type();
    </script>

</body>
